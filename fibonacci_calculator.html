<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <meta name="description"
          content="Fibonacci Calculator" />

    <title>Fibonacci Calculator</title>

    <link rel="stylesheet"
          href="./estilos_fibonacci.css" />
</head>

<body>

    <div class="container">
        <img src="./Captura de tela 2026-05-26 123853.jpg"
             alt="Fibonacci Image"
             />

        <h1>Fibonacci Calculator</h1>

        <p>Enter a number to calculate its Fibonacci value:</p>

        <input type="number"
                id="inputNumber"
                placeholder="Enter a number" />

        <button id="calculateButton">
            Calculate
        </button>

        <p id="result"></p>

    </div>
    <script src="./fibonacci_calculator.js"></script>

</body>
</html>
